name: Deploy Data to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/data/**'
      - 'tools/generate-api.py'
      - '.github/workflows/deploy-data.yml'
      - '_headers'
  workflow_run:
    workflows: ["Sync Upstream"]
    types:
      - completed
    branches: [master]

jobs:
  deploy:
    # Skip deploy if the upstream sync failed
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate API files
        run: python tools/generate-api.py

      - name: Copy Cloudflare Pages headers
        run: cp _headers dist/

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler pages deploy dist \
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'pvpoke-data' }} \
            --branch=master
