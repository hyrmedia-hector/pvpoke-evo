name: Deploy Data to Cloudflare R2 and Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/data/**'
      - 'tools/generate-api.py'
      - '.github/workflows/deploy-data.yml'
      - '_headers'
  workflow_run:
    workflows: ["Sync Upstream"]
    types:
      - completed
    branches: [master]

concurrency:
  group: deploy-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    # Skip deploy if the upstream sync failed
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set generated metadata
        run: |
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "PVPOKE_SOURCE_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "PVPOKE_GENERATED_AT=$GENERATED_AT" >> "$GITHUB_ENV"
          echo "PVPOKE_PROMOTED_AT=$GENERATED_AT" >> "$GITHUB_ENV"

      - name: Generate API files
        run: python3 tools/generate-api.py

      - name: Validate generated API files
        run: python3 tools/generate-api.py --validate-only

      - name: Verify stable data version
        run: |
          VERSION_BEFORE="$(python3 - <<'PY'
          import json
          print(json.load(open('dist/v1/catalog.json'))['version'])
          PY
          )"
          python3 tools/generate-api.py
          VERSION_AFTER="$(python3 - <<'PY'
          import json
          print(json.load(open('dist/v1/catalog.json'))['version'])
          PY
          )"
          test "$VERSION_BEFORE" = "$VERSION_AFTER"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Resolve data version
        id: catalog
        run: |
          VERSION="$(python3 - <<'PY'
          import json
          print(json.load(open('dist/v1/catalog.json'))['version'])
          PY
          )"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved data version: $VERSION"

      - name: Upload immutable bundle to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || 'pvpoke-data' }}
          DATA_VERSION: ${{ steps.catalog.outputs.version }}
          R2_UPLOAD_CONCURRENCY: ${{ vars.R2_UPLOAD_CONCURRENCY || '4' }}
          R2_UPLOAD_ATTEMPTS: ${{ vars.R2_UPLOAD_ATTEMPTS || '5' }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/content-types.tsv
          from pathlib import Path
          for path in sorted(Path('dist').rglob('*')):
              if not path.is_file() or path.name == 'current.json':
                  continue
              rel = path.relative_to('dist').as_posix()
              if path.suffix == '.json':
                  content_type = 'application/json; charset=utf-8'
              elif path.suffix == '.php':
                  content_type = 'text/plain; charset=utf-8'
              else:
                  content_type = 'application/octet-stream'
              print(f"{path}\t{rel}\t{content_type}")
          PY

          TOTAL="$(wc -l < /tmp/content-types.tsv | tr -d ' ')"
          echo "Uploading $TOTAL objects to R2 with concurrency $R2_UPLOAD_CONCURRENCY"
          echo 0 > /tmp/r2-upload-count

          upload_one() {
            local line="$1"
            local file rel content_type count log_path attempt exit_code sleep_for
            IFS=$'\t' read -r file rel content_type <<< "$line"
            log_path="/tmp/r2-object-${rel//[^A-Za-z0-9_.-]/_}.log"
            attempt=1

            while [ "$attempt" -le "$R2_UPLOAD_ATTEMPTS" ]; do
              if wrangler r2 object put "$R2_BUCKET_NAME/versions/$DATA_VERSION/$rel" \
                --remote \
                --file "$file" \
                --content-type "$content_type" \
                >"$log_path" 2>&1; then
                break
              fi

              exit_code="$?"
              if grep -Eq '429: Too Many Requests|code":10058' "$log_path" && [ "$attempt" -lt "$R2_UPLOAD_ATTEMPTS" ]; then
                sleep_for="$(( attempt * attempt * 5 ))"
                echo "R2 upload throttled for $rel on attempt $attempt/$R2_UPLOAD_ATTEMPTS; retrying in ${sleep_for}s"
                sleep "$sleep_for"
                attempt="$(( attempt + 1 ))"
                continue
              fi

              cat "$log_path"
              return "$exit_code"
            done

            {
              flock 9
              count="$(( $(cat /tmp/r2-upload-count) + 1 ))"
              echo "$count" > /tmp/r2-upload-count
              if [ $((count % 25)) -eq 0 ] || [ "$count" -eq "$TOTAL" ]; then
                echo "Uploaded $count/$TOTAL objects"
              fi
            } 9>/tmp/r2-upload-count.lock
          }
          export -f upload_one
          export R2_BUCKET_NAME DATA_VERSION TOTAL R2_UPLOAD_ATTEMPTS

          xargs -r -P "$R2_UPLOAD_CONCURRENCY" -n 1 -d '\n' \
            bash -c 'upload_one "$1"' _ < /tmp/content-types.tsv

      - name: Promote current data version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || 'pvpoke-data' }}
        run: |
          wrangler r2 object put "$R2_BUCKET_NAME/current.json" \
            --remote \
            --file dist/current.json \
            --content-type "application/json; charset=utf-8"

      - name: Process promoted version in Worker
        env:
          API_ADMIN_SECRET: ${{ secrets.API_ADMIN_SECRET }}
          UNIFIED_API_BASE_URL: ${{ vars.UNIFIED_API_BASE_URL || 'https://api.ivleague-pogo.app' }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "X-Admin-Secret: $API_ADMIN_SECRET" \
            "$UNIFIED_API_BASE_URL/v1/admin/process-version"

      - name: Copy Cloudflare Pages headers
        run: cp _headers dist/

      - name: Deploy rollback mirror to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist \
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'pvpoke-data' }} \
            --branch=master
