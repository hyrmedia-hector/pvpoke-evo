name: Sync PvPoke Upstream Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      expected_data_tree_sha:
        description: 'Upstream src/data tree detected by the parity controller'
        required: false
        type: string
      alert_reason:
        description: 'Controller-generated fail-closed alert; a non-empty value intentionally fails this run'
        required: false
        type: string

concurrency:
  group: pvpoke-upstream-data-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fork with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Surface controller alert
        if: inputs.alert_reason != ''
        env:
          ALERT_REASON: ${{ inputs.alert_reason }}
        run: |
          echo "PvPoke parity controller alert: $ALERT_REASON" >&2
          exit 1

      - name: Merge upstream without discarding fork commits
        id: sync
        env:
          EXPECTED_DATA_TREE_SHA: ${{ inputs.expected_data_tree_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/pvpoke/pvpoke.git 2>/dev/null || true
          git fetch upstream master
          git fetch origin master
          git checkout master
          git merge --ff-only origin/master

          upstream_commit="$(git rev-parse upstream/master)"
          upstream_tree="$(git rev-parse upstream/master:src/data)"
          source_tree="$(git rev-parse HEAD:src/data)"
          changed=false
          if [ "$source_tree" != "$upstream_tree" ]; then
            git merge --no-edit upstream/master
            test "$(git rev-parse HEAD:src/data)" = "$upstream_tree"
            git push origin HEAD:master
            changed=true
          fi

          source_commit="$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD:src/data)" = "$upstream_tree"
          if [ -n "$EXPECTED_DATA_TREE_SHA" ] && [ "$EXPECTED_DATA_TREE_SHA" != "$upstream_tree" ]; then
            echo "Controller requested $EXPECTED_DATA_TREE_SHA; upstream advanced to $upstream_tree. Synchronizing latest."
          fi
          {
            echo "changed=$changed"
            echo "source_commit=$source_commit"
            echo "upstream_commit=$upstream_commit"
            echo "data_tree_sha=$upstream_tree"
          } >> "$GITHUB_OUTPUT"

      - name: Notify iv-league-pogo that synchronized data is ready
        if: steps.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          IV_LEAGUE_DISPATCH_TOKEN: ${{ secrets.IV_LEAGUE_DISPATCH_TOKEN }}
          SOURCE_COMMIT: ${{ steps.sync.outputs.source_commit }}
          UPSTREAM_COMMIT: ${{ steps.sync.outputs.upstream_commit }}
          DATA_TREE_SHA: ${{ steps.sync.outputs.data_tree_sha }}
        run: |
          set -euo pipefail
          if [ -z "$IV_LEAGUE_DISPATCH_TOKEN" ]; then
            echo "IV_LEAGUE_DISPATCH_TOKEN is not configured; the downstream publisher schedule remains the recovery path."
            exit 0
          fi
          jq -n \
            --arg source_commit "$SOURCE_COMMIT" \
            --arg upstream_commit "$UPSTREAM_COMMIT" \
            --arg data_tree_sha "$DATA_TREE_SHA" \
            '{event_type:"pvpoke-data-synced",client_payload:{source_commit:$source_commit,upstream_commit:$upstream_commit,data_tree_sha:$data_tree_sha}}' \
            > /tmp/pvpoke-data-synced.json
          curl --retry 3 --retry-all-errors --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $IV_LEAGUE_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/HYRMedia-LLC/iv-league-pogo/dispatches \
            --data-binary @/tmp/pvpoke-data-synced.json

      - name: Alert operations on synchronization failure
        if: failure()
        env:
          OPS_ALERT_WEBHOOK: ${{ secrets.OPS_ALERT_WEBHOOK }}
        run: |
          if [ -z "$OPS_ALERT_WEBHOOK" ]; then
            echo "OPS_ALERT_WEBHOOK is not configured; workflow failure remains visible in GitHub Actions." >&2
            exit 0
          fi
          curl --retry 3 --retry-all-errors --fail-with-body \
            -X POST -H 'Content-Type: application/json' \
            --data "{\"event\":\"pvpoke_upstream_sync_failed\",\"repository\":\"${{ github.repository }}\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$OPS_ALERT_WEBHOOK"
