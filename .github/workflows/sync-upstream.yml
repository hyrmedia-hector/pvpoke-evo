name: Sync Upstream

on:
  schedule:
    # Runs daily at 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync (leave empty for default branch)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Resolve target branch
        id: branch
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH=$(gh api repos/${{ github.repository }} --jq '.default_branch')
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Syncing branch: $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout fork branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}
          fetch-depth: 0

      - name: Merge upstream into fork branch
        id: sync
        run: |
          set -u

          BRANCH="${{ steps.branch.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/pvpoke/pvpoke.git
          git fetch origin "$BRANCH"
          git fetch upstream "$BRANCH"

          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"

          COUNTS=$(git rev-list --left-right --count "HEAD...upstream/$BRANCH")
          AHEAD=$(echo "$COUNTS" | awk '{print $1}')
          BEHIND=$(echo "$COUNTS" | awk '{print $2}')

          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

          if [ "$BEHIND" = "0" ]; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            echo "push_needed=false" >> "$GITHUB_OUTPUT"
            echo "Branch is already up to date with upstream."
            exit 0
          fi

          if git merge --no-edit "upstream/$BRANCH"; then
            git push origin "HEAD:$BRANCH"
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            echo "push_needed=true" >> "$GITHUB_OUTPUT"
          else
            git merge --abort || true
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            echo "push_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on merge conflicts
        if: steps.sync.outputs.conflict == 'true'
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          TITLE="Upstream sync conflicts for branch $BRANCH"

          gh label create "upstream-sync" --color "0366d6" --description "Upstream sync failures" 2>/dev/null || true

          EXISTING=$(gh issue list \
            --state open \
            --label "upstream-sync" \
            --search "$TITLE in:title" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already tracks this upstream sync conflict."
            exit 0
          fi

          cat > upstream-sync-conflict.md <<EOF
          The automated upstream sync could not merge \`pvpoke/pvpoke:$BRANCH\` into \`${{ github.repository }}:$BRANCH\` without conflicts.

          This workflow intentionally preserves fork commits. Do not use GitHub's **Discard commits** button.

          Resolve the conflicts locally with:

          \`\`\`bash
          git fetch origin upstream
          git checkout $BRANCH
          git merge upstream/$BRANCH
          # resolve conflicts, then:
          git add <resolved files>
          git commit
          git push origin $BRANCH
          \`\`\`

          Fork commits currently ahead of upstream: ${{ steps.sync.outputs.ahead }}
          Upstream commits currently behind: ${{ steps.sync.outputs.behind }}

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh issue create \
            --title "$TITLE" \
            --body-file upstream-sync-conflict.md \
            --label "upstream-sync"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail when manual conflict resolution is needed
        if: steps.sync.outputs.conflict == 'true'
        run: exit 1
